<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok Analytics Clone</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ===== YOUR CSS (SHORTENED IMPORTANT PARTS) ===== */
body {
    font-family: 'Inter', sans-serif;
    background: #f5f6f8;
    margin: 0;
}

.phone-frame {
    max-width: 420px;
    margin: auto;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
}

.topbar {
    padding: 15px;
    font-weight: 700;
    text-align: center;
    border-bottom: 1px solid #eee;
}

.tabs {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    text-align: center;
    border-bottom: 1px solid #eee;
}

.tab {
    padding: 12px;
    cursor: pointer;
    color: gray;
}

.tab.active {
    color: black;
    border-bottom: 2px solid black;
}

/* SECTIONS */
.tab-content {
    display: none;
    padding: 15px;
}

.tab-content.active {
    display: block;
}

/* CARDS */
.card {
    background: white;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.big-number {
    font-size: 32px;
    font-weight: 800;
}

/* GRAPH */
canvas {
    width: 100% !important;
    height: 200px !important;
}
</style>
</head>

<body>

<div class="phone-frame">

    <div class="topbar">Video analytics</div>

    <!-- TABS -->
    <div class="tabs">
        <div class="tab active" onclick="switchTab('overview')">Overview</div>
        <div class="tab" onclick="switchTab('viewers')">Viewers</div>
        <div class="tab" onclick="switchTab('engagement')">Engagement</div>
    </div>

    <!-- OVERVIEW -->
    <div id="overview" class="tab-content active">

        <div class="card">
            <div>Total views</div>
            <div class="big-number">5,499</div>
        </div>

        <div class="card">
            <canvas id="viewsChart"></canvas>
        </div>

        <div class="card">
            <div>Average watch time</div>
            <div class="big-number">8.3s</div>
        </div>

        <div class="card">
            <div>Completed views</div>
            <div class="big-number">62%</div>
        </div>

    </div>

    <!-- VIEWERS -->
    <div id="viewers" class="tab-content">

        <div class="card">
            <div>Total viewers</div>
            <div class="big-number">57</div>
        </div>

        <div class="card">
            <canvas id="genderChart"></canvas>
        </div>

    </div>

    <!-- ENGAGEMENT -->
    <div id="engagement" class="tab-content">

        <div class="card">
            <div>Likes</div>
            <div class="big-number">6</div>
        </div>

        <div class="card">
            <div>Comments</div>
            <div class="big-number">0</div>
        </div>

        <div class="card">
            <div>Shares</div>
            <div class="big-number">0</div>
        </div>

    </div>

</div>

<script>
/* TAB SWITCH */
function switchTab(tabId) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));

    event.target.classList.add("active");
    document.getElementById(tabId).classList.add("active");
}

/* OVERVIEW GRAPH */
new Chart(document.getElementById("viewsChart"), {
    type: "line",
    data: {
        labels: ["0h","2h","4h","6h","8h","10h","12h"],
        datasets: [{
            data: [100, 500, 1200, 2500, 3500, 4800, 5499],
            borderColor: "#1677ff",
            fill: false,
            tension: 0.4
        }]
    },
    options: {
        plugins: { legend: { display: false }},
        scales: { x: { display: false }, y: { display: false }}
    }
});

/* GENDER CHART */
new Chart(document.getElementById("genderChart"), {
    type: "doughnut",
    data: {
        labels: ["Male", "Female"],
        datasets: [{
            data: [81,19],
            backgroundColor: ["#1677ff","#7eb6ff"]
        }]
    },
    options: {
        plugins: { legend: { display: false }}
    }
});
</script>

</body>
</html>
